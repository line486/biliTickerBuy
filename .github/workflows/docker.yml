name: Docker Build and Publish

on:
  workflow_dispatch:
    inputs:
      docker_image_name:
        description: 'Docker image name'
        required: false
        default: 'bilitickerbuy'
        type: string
      docker_registry:
        description: 'Docker registry (ghcr.io for GitHub Packages)'
        required: false
        default: 'ghcr.io'
        type: string

permissions:
  contents: read
  packages: write

jobs:
  build:
    name: Build and Push Docker Image
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ inputs.docker_registry || 'ghcr.io' }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ inputs.docker_registry || 'ghcr.io' }}/${{ github.repository_owner }}/${{ inputs.docker_image_name || 'bilitickerbuy' }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=sha,prefix={{branch}}-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Image digest
        run: echo "Image built successfully with tags: ${{ steps.meta.outputs.tags }}"
